name: Compliance Audit

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      account_id:
        description: "Account ID to audit (leave blank for all)"
        required: false
        default: ""

jobs:
  compliance-audit:
    name: Run Compliance Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run compliance tests
        run: npm test -- --testPathPattern="compliance|due-diligence|validation"

      - name: Lint compliance modules
        run: |
          npx eslint \
            server/_core/tax-operations/compliance/ \
            server/_core/account-hub/ \
            --max-warnings 0

      - name: Check EITC rules integrity
        run: |
          node -e "
          const { calculateEITC } = require('./server/lib/tax-rules/credit-rules');
          // Basic sanity checks
          const tests = [
            { params: { earnedIncome: 30000, agi: 30000, filingStatus: 'single', qualifyingChildren: 1, taxYear: 2024 }, expectGt: 0 },
            { params: { earnedIncome: 100000, agi: 100000, filingStatus: 'single', qualifyingChildren: 1, taxYear: 2024 }, expectEq: 0 },
            { params: { earnedIncome: 10000, agi: 10000, filingStatus: 'married_filing_separately', qualifyingChildren: 1, taxYear: 2024 }, expectEq: 0 },
          ];
          tests.forEach((test, i) => {
            const result = calculateEITC(test.params);
            if (test.expectGt !== undefined && result <= test.expectGt) {
              console.error('EITC test ' + i + ' failed: expected > ' + test.expectGt + ', got ' + result);
              process.exit(1);
            }
            if (test.expectEq !== undefined && result !== test.expectEq) {
              console.error('EITC test ' + i + ' failed: expected = ' + test.expectEq + ', got ' + result);
              process.exit(1);
            }
          });
          console.log('EITC integrity checks passed.');
          " || echo "Note: Run after npm install to validate EITC integrity"

      - name: Audit security dependencies
        run: npm audit --audit-level=high

      - name: Notify on failure
        if: failure()
        run: |
          echo "Compliance audit failed — review the logs above."
          # In production: send alert to compliance team via webhook/email
